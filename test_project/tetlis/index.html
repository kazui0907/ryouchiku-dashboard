<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木材テトリス</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="wood-frame">
            <h1>🪵 木材テトリス 🪵</h1>
            <div class="game-area">
                <div class="main-board">
                    <canvas id="gameCanvas" width="300" height="600"></canvas>
                </div>
                <div class="side-panel">
                    <div class="info-box">
                        <h3>次のブロック</h3>
                        <canvas id="nextCanvas" width="120" height="120"></canvas>
                    </div>
                    <div class="info-box">
                        <h3>スコア</h3>
                        <p id="score">0</p>
                    </div>
                    <div class="info-box">
                        <h3>レベル</h3>
                        <p id="level">1</p>
                    </div>
                    <div class="info-box">
                        <h3>ライン</h3>
                        <p id="lines">0</p>
                    </div>
                    <div class="controls">
                        <h3>操作方法</h3>
                        <p>← → : 移動</p>
                        <p>↑ : 回転</p>
                        <p>↓ : 落下加速</p>
                        <p>Space : 即落下</p>
                        <p>P : 一時停止</p>
                    </div>
                </div>
            </div>
            <button id="startBtn" class="wood-button">ゲーム開始</button>
            <div id="gameOver" class="game-over hidden">
                <h2>ゲームオーバー</h2>
                <p>スコア: <span id="finalScore">0</span></p>
            </div>
            <div id="pauseOverlay" class="pause-overlay hidden">
                <h2>一時停止中</h2>
                <p>Pキーで再開</p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
