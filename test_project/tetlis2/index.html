<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テトリス</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="side-panel left">
            <div class="hold-box">
                <h3>HOLD</h3>
                <canvas id="holdCanvas" width="100" height="100"></canvas>
            </div>
        </div>
        <div class="main-panel">
            <div class="score-board">
                <div class="score-item">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">LEVEL</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="score-item">
                    <span class="label">LINES</span>
                    <span id="lines" class="value">0</span>
                </div>
            </div>
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div id="gameOver" class="game-over hidden">
                <h2>GAME OVER</h2>
                <p>スコア: <span id="finalScore">0</span></p>
                <button id="restartBtn">もう一度プレイ</button>
            </div>
        </div>
        <div class="side-panel right">
            <div class="next-box">
                <h3>NEXT</h3>
                <canvas id="nextCanvas" width="100" height="300"></canvas>
            </div>
        </div>
    </div>
    <div class="controls-info">
        <p>← → : 移動 | ↑ : 回転 | ↓ : 落下加速 | Space : ハードドロップ | C : ホールド | P : 一時停止</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
